<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 To-Do List</h1>
    
    <!-- Input + Button -->
    <div class="input-group">
      <input type="text" id="todo-input" placeholder="Tulis aktivitas baru...">
      <button id="add-btn" onclick="CreateTodo()">Tambah</button>
    </div>

    <!-- Tempat list item -->
    <ul id="todo-list"></ul>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
